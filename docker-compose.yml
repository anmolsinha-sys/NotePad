version: '3.8'

services:
  auth-service:
    build:
      context: ./services/auth-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    restart: always

  notes-service:
    build:
      context: ./services/notes-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    restart: always

  live-service:
    build:
      context: ./services/live-service
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
    restart: always

  client:
    build:
      context: ./client
      dockerfile: ../client/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5002
      - NEXT_PUBLIC_AUTH_URL=http://localhost:5001
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5003
    depends_on:
      - auth-service
      - notes-service
      - live-service
